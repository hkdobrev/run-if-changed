name: Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 20, 22, 24 ]
    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    # Newer npm avoids the optional native-binding install bug (npm/cli#4828)
    # that affects oxlint/oxfmt on Node 20.
    - run: npm install -g npm@latest
    - name: Install Dependencies
      run: npm ci
    - name: npm test
      run: npm test
